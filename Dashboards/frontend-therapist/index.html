<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayur Narayana - Therapist Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .notification-badge {
            position: relative;
            cursor: pointer;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .notification-badge:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .badge-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #11998e;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .stat-card h3 {
            font-size: 14px;
            color: #777;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #11998e;
        }

        /* Patient Cards */
        .patients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .patient-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .patient-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .patient-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e1e8ed;
        }

        .patient-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-assigned {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-in_progress {
            background: #d4edda;
            color: #155724;
        }

        .status-completed {
            background: #d1d3e2;
            color: #383d41;
        }

        .patient-info {
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            margin-bottom: 10px;
        }

        .info-label {
            font-weight: 600;
            color: #555;
            min-width: 120px;
        }

        .info-value {
            color: #333;
        }

        .patient-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-view {
            background: #48dbfb;
            color: white;
        }

        .btn-view:hover {
            background: #0abde3;
        }

        .btn-update {
            background: #11998e;
            color: white;
        }

        .btn-update:hover {
            background: #0e7c6f;
        }

        .btn-notes {
            background: #ffa502;
            color: white;
        }

        .btn-notes:hover {
            background: #ff7f00;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 24px;
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .detail-row {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e1e8ed;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 15px;
        }

        .hidden {
            display: none;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* Notifications Dropdown */
        .notifications-dropdown {
            position: absolute;
            top: 70px;
            right: 100px;
            background: white;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .notifications-dropdown.active {
            display: block;
        }

        .notification-item {
            padding: 15px;
            border-bottom: 1px solid #e1e8ed;
            cursor: pointer;
            transition: background 0.3s;
        }

        .notification-item:hover {
            background: #f8f9fa;
        }

        .notification-item.unread {
            background: #e3f2fd;
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .notification-message {
            font-size: 13px;
            color: #666;
        }

        .notification-time {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
        }

        /* Session Notes */
        .notes-list {
            margin-top: 20px;
        }

        .note-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .note-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .note-content {
            color: #333;
        }

        .section-header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .section-header h2 {
            font-size: 24px;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🩺 Therapist Login</h2>
            <div id="loginError"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="therapist@ayurnarayana.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <div class="header">
            <h1>🩺 Ayur Narayana - Therapist Dashboard</h1>
            <div class="user-info">
                <div class="notification-badge" onclick="toggleNotifications()">
                    🔔
                    <span class="badge-count" id="notificationCount">0</span>
                </div>
                <span id="userName">Therapist</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Notifications Dropdown -->
        <div id="notificationsDropdown" class="notifications-dropdown">
            <div id="notificationsList"></div>
        </div>

        <div class="container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Assigned to Me</h3>
                    <div class="number" id="assignedCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>In Progress</h3>
                    <div class="number" id="inProgressCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Completed</h3>
                    <div class="number" id="completedCount">0</div>
                </div>
            </div>

            <!-- Patients Section -->
            <div class="section-header">
                <h2>My Patients</h2>
            </div>

            <div class="patients-grid" id="patientsGrid">
                <div class="no-data">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Patient Details Modal -->
    <div id="patientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Patient Details</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalMessage"></div>
            <div id="patientDetails"></div>
        </div>
    </div>

    <!-- Update Status Modal -->
    <div id="updateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Update Status</h3>
                <button class="close-btn" onclick="closeUpdateModal()">&times;</button>
            </div>
            <div id="updateMessage"></div>
            <form id="updateForm">
                <input type="hidden" id="updateRequestId">
                <div class="form-group">
                    <label>Update Status</label>
                    <select id="statusSelect">
                        <option value="assigned">Assigned</option>
                        <option value="in_progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Update Status</button>
            </form>
        </div>
    </div>

    <!-- Add Notes Modal -->
    <div id="notesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Session Notes</h3>
                <button class="close-btn" onclick="closeNotesModal()">&times;</button>
            </div>
            <div id="notesMessage"></div>
            
            <!-- Add new note form -->
            <form id="notesForm">
                <input type="hidden" id="notesRequestId">
                <div class="form-group">
                    <label>Add Session Note</label>
                    <textarea id="sessionNoteText" placeholder="Enter session notes here..." required></textarea>
                </div>
                <button type="submit" class="btn-primary">Add Note</button>
            </form>

            <!-- Previous notes -->
            <div class="notes-list" id="previousNotes"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let authToken = localStorage.getItem('therapist_token');
        let currentUser = null;
        let myPatients = [];

        // Check if user is logged in
        if (authToken) {
            showDashboard();
        }

        // Login Form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.user.role !== 'therapist') {
                        showError('loginError', 'Access denied. Therapist only.');
                        return;
                    }
                    authToken = data.access_token;
                    localStorage.setItem('therapist_token', authToken);
                    localStorage.setItem('therapist_user', JSON.stringify(data.user));
                    showDashboard();
                } else {
                    showError('loginError', data.detail || 'Login failed');
                }
            } catch (error) {
                showError('loginError', 'Connection error. Please try again.');
            }
        });

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            currentUser = JSON.parse(localStorage.getItem('therapist_user'));
            document.getElementById('userName').textContent = currentUser.name;

            loadData();
            setInterval(loadNotifications, 30000); // Refresh notifications every 30s
        }

        async function loadData() {
            await loadStats();
            await loadPatients();
            await loadNotifications();
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                
                document.getElementById('assignedCount').textContent = data.stats.assigned_to_me;
                document.getElementById('inProgressCount').textContent = data.stats.in_progress;
                document.getElementById('completedCount').textContent = data.stats.completed_by_me;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadPatients() {
            try {
                const response = await fetch(`${API_URL}/requests`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                myPatients = data.requests;
                displayPatients(myPatients);
            } catch (error) {
                console.error('Error loading patients:', error);
            }
        }

        function displayPatients(patients) {
            const grid = document.getElementById('patientsGrid');
            
            if (patients.length === 0) {
                grid.innerHTML = '<div class="no-data">No patients assigned yet</div>';
                return;
            }

            grid.innerHTML = patients.map(patient => `
                <div class="patient-card">
                    <div class="patient-header">
                        <div class="patient-name">${patient.patient_name}</div>
                        <span class="status-badge status-${patient.status}">${patient.status.replace('_', ' ')}</span>
                    </div>
                    <div class="patient-info">
                        <div class="info-row">
                            <span class="info-label">Phone:</span>
                            <span class="info-value">${patient.phone}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Location:</span>
                            <span class="info-value">${patient.location}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Condition:</span>
                            <span class="info-value">${patient.condition}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Preferred Time:</span>
                            <span class="info-value">${patient.preferred_time || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="patient-actions">
                        <button class="action-btn btn-view" onclick="viewPatient('${patient.id}')">View</button>
                        <button class="action-btn btn-update" onclick="updateStatus('${patient.id}', '${patient.status}')">Update</button>
                        <button class="action-btn btn-notes" onclick="viewNotes('${patient.id}')">Notes</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadNotifications() {
            try {
                const response = await fetch(`${API_URL}/notifications/unread/count`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                document.getElementById('notificationCount').textContent = data.count;

                // Load full notifications
                const notifResponse = await fetch(`${API_URL}/notifications`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const notifData = await notifResponse.json();
                displayNotifications(notifData.notifications);
            } catch (error) {
                console.error('Error loading notifications:', error);
            }
        }

        function displayNotifications(notifications) {
            const list = document.getElementById('notificationsList');
            if (notifications.length === 0) {
                list.innerHTML = '<div class="notification-item">No notifications</div>';
                return;
            }

            list.innerHTML = notifications.map(notif => `
                <div class="notification-item ${!notif.is_read ? 'unread' : ''}" onclick="markAsRead('${notif.id}')">
                    <div class="notification-title">${notif.title}</div>
                    <div class="notification-message">${notif.message}</div>
                    <div class="notification-time">${new Date(notif.created_at).toLocaleString()}</div>
                </div>
            `).join('');
        }

        function toggleNotifications() {
            const dropdown = document.getElementById('notificationsDropdown');
            dropdown.classList.toggle('active');
        }

        async function markAsRead(notifId) {
            try {
                await fetch(`${API_URL}/notifications/${notifId}/read`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                loadNotifications();
            } catch (error) {
                console.error('Error marking notification as read:', error);
            }
        }

        async function viewPatient(patientId) {
            try {
                const response = await fetch(`${API_URL}/requests/${patientId}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                const patient = data.request;

                document.getElementById('patientDetails').innerHTML = `
                    <div class="detail-row">
                        <div class="detail-label">Patient Name</div>
                        <div class="detail-value">${patient.patient_name}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Phone</div>
                        <div class="detail-value">${patient.phone}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Email</div>
                        <div class="detail-value">${patient.email || 'N/A'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Location</div>
                        <div class="detail-value">${patient.location}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Condition</div>
                        <div class="detail-value">${patient.condition}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Preferred Time</div>
                        <div class="detail-value">${patient.preferred_time || 'N/A'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Status</div>
                        <div class="detail-value"><span class="status-badge status-${patient.status}">${patient.status.replace('_', ' ')}</span></div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Admin Notes</div>
                        <div class="detail-value">${patient.notes || 'No notes'}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">Created At</div>
                        <div class="detail-value">${new Date(patient.created_at).toLocaleString()}</div>
                    </div>
                `;

                document.getElementById('patientModal').classList.add('active');
            } catch (error) {
                console.error('Error fetching patient:', error);
            }
        }

        function updateStatus(patientId, currentStatus) {
            document.getElementById('updateRequestId').value = patientId;
            document.getElementById('statusSelect').value = currentStatus;
            document.getElementById('updateModal').classList.add('active');
        }

        document.getElementById('updateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const requestId = document.getElementById('updateRequestId').value;
            const status = document.getElementById('statusSelect').value;

            try {
                const response = await fetch(`${API_URL}/requests/${requestId}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });

                if (response.ok) {
                    showUpdateSuccess('Status updated successfully!');
                    setTimeout(() => {
                        closeUpdateModal();
                        loadData();
                    }, 1500);
                } else {
                    showUpdateError('Failed to update status');
                }
            } catch (error) {
                showUpdateError('Connection error. Please try again.');
            }
        });

        async function viewNotes(patientId) {
            document.getElementById('notesRequestId').value = patientId;
            document.getElementById('sessionNoteText').value = '';
            document.getElementById('notesModal').classList.add('active');
            await loadSessionNotes(patientId);
        }

        async function loadSessionNotes(requestId) {
            try {
                const response = await fetch(`${API_URL}/session-notes/${requestId}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                
                const notesList = document.getElementById('previousNotes');
                
                if (data.notes.length === 0) {
                    notesList.innerHTML = '<p style="text-align: center; color: #999; margin-top: 20px;">No previous notes</p>';
                    return;
                }

                notesList.innerHTML = '<h3 style="margin-top: 30px; margin-bottom: 15px;">Previous Notes</h3>' + 
                    data.notes.map(note => `
                        <div class="note-item">
                            <div class="note-date">${new Date(note.created_at).toLocaleString()}</div>
                            <div class="note-content">${note.notes}</div>
                        </div>
                    `).join('');
            } catch (error) {
                console.error('Error loading notes:', error);
            }
        }

        document.getElementById('notesForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const requestId = document.getElementById('notesRequestId').value;
            const notes = document.getElementById('sessionNoteText').value;

            try {
                const response = await fetch(`${API_URL}/session-notes`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        request_id: requestId,
                        therapist_id: currentUser.id,
                        notes: notes
                    })
                });

                if (response.ok) {
                    showNotesSuccess('Note added successfully!');
                    document.getElementById('sessionNoteText').value = '';
                    await loadSessionNotes(requestId);
                } else {
                    showNotesError('Failed to add note');
                }
            } catch (error) {
                showNotesError('Connection error. Please try again.');
            }
        });

        function closeModal() {
            document.getElementById('patientModal').classList.remove('active');
            document.getElementById('modalMessage').innerHTML = '';
        }

        function closeUpdateModal() {
            document.getElementById('updateModal').classList.remove('active');
            document.getElementById('updateMessage').innerHTML = '';
        }

        function closeNotesModal() {
            document.getElementById('notesModal').classList.remove('active');
            document.getElementById('notesMessage').innerHTML = '';
        }

        function logout() {
            localStorage.removeItem('therapist_token');
            localStorage.removeItem('therapist_user');
            location.reload();
        }

        function showError(elementId, message) {
            document.getElementById(elementId).innerHTML = `<div class="error-message">${message}</div>`;
        }

        function showUpdateError(message) {
            document.getElementById('updateMessage').innerHTML = `<div class="error-message">${message}</div>`;
        }

        function showUpdateSuccess(message) {
            document.getElementById('updateMessage').innerHTML = `<div class="success-message">${message}</div>`;
        }

        function showNotesError(message) {
            document.getElementById('notesMessage').innerHTML = `<div class="error-message">${message}</div>`;
        }

        function showNotesSuccess(message) {
            document.getElementById('notesMessage').innerHTML = `<div class="success-message">${message}</div>`;
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.notification-badge') && !e.target.closest('.notifications-dropdown')) {
                document.getElementById('notificationsDropdown').classList.remove('active');
            }
        });
    </script>
</body>
</html>
