# ═══════════════════════════════════════════════════════════════════
# cloudbuild.yaml — Ayur Narayana CI/CD Pipeline
#
# Trigger: push to `main` branch
# Pipeline:
#   1. Build Docker image
#   2. Push to Artifact Registry
#   3. Deploy to Cloud Run
# ═══════════════════════════════════════════════════════════════════

substitutions:
  _REGION: asia-south1          # Mumbai — closest to Bangalore
  _SERVICE_NAME: ayurnarayana
  _REPO_NAME: ayurnarayana-repo # Artifact Registry repository name

steps:

  # ── Step 1: Build the Docker image ──────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - build
      - '--no-cache'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'
      - '.'

  # ── Step 2: Push image to Artifact Registry ──────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}'
    waitFor: ['build-image']

  # ── Step 3: Deploy to Cloud Run ───────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'        # Public website
      - '--port=8080'
      - '--cpu=1'
      - '--memory=256Mi'
      - '--min-instances=0'              # Scale to zero (cost-efficient)
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=30'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push-image']

# ── Image stored in Artifact Registry ───────────────────────────────
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_SERVICE_NAME}:latest'

# ── Build options ────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8       # Faster builds

# ── Build timeout ────────────────────────────────────────────────────
timeout: '1200s'
