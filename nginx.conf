# nginx.conf — Ayur Narayana
# $PORT is injected at container start via envsubst in Dockerfile CMD

server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ─── Security headers ───────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header X-Frame-Options          "SAMEORIGIN"      always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Allow Supabase API calls from the browser (CORS not needed server-side
    # for a pure static site — Supabase handles its own CORS)

    # ─── Gzip compression ───────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ─── Cache static assets ────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires     30d;
        add_header  Cache-Control "public, immutable";
    }

    # ─── Health check endpoint (used by Cloud Run) ──────────────
    location /health {
        access_log  off;
        return      200 "OK\n";
        add_header  Content-Type text/plain;
    }

    # ─── SPA fallback (serve index.html for all routes) ─────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
